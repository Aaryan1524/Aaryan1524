<svg width="850" height="220" viewBox="0 0 850 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aaryan Gulati — Personal Intelligence, Engineered.">
  <defs>
    <style>
      .paper { fill: #14130F; }
      .ink   { fill: #EDE9E0; }
      .muted { fill: #8A8377; }
      .rule  { stroke: #EDE9E0; stroke-width: 1; }
      .name  { font-family: Georgia, 'Times New Roman', serif; font-weight: 600; }
      .ital  { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 600; }
      .label { font-family: 'Courier New', monospace; letter-spacing: 0.42em; font-weight: 700; }
      .sub   { font-family: Georgia, 'Times New Roman', serif; font-style: italic; }
    </style>
  </defs>

  <rect width="850" height="220" class="paper"/>

  <text x="425" y="48" text-anchor="middle" class="label muted" font-size="13">PERSONAL  INTELLIGENCE  ·  EST. 2026</text>

  <line x1="150" y1="44" x2="245" y2="44" class="rule"/>
  <line x1="605" y1="44" x2="700" y2="44" class="rule"/>

  <text x="417" y="124" text-anchor="middle" class="ink" font-size="62">
    <tspan class="name">Aaryan</tspan><tspan class="ital"> Gulati</tspan>
  </text>

  <text x="425" y="170" text-anchor="middle" class="sub muted" font-size="20">Building at the intersection of AI, systems, and product.</text>

  <line x1="300" y1="196" x2="550" y2="196" class="rule"/>
</svg>
